name: 毎日ニュース要約動画

on:
  schedule:
    - cron: "0 22 * * *" # 毎日 7:00 JST (22:00 UTC)
  workflow_dispatch: # 手動実行も可能

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('news-automation/requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r news-automation/requirements.txt

      - name: Generate and upload news video
        working-directory: news-automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python main.py

      - name: Upload video artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-video-debug
          path: news-automation/output/
          retention-days: 3
