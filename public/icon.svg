<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd34d"/>
      <stop offset="100%" stop-color="#ff9c5b"/>
    </linearGradient>
  </defs>
  <!-- 背景（角丸の塗り） -->
  <rect x="32" y="32" width="960" height="960" rx="200" ry="200" fill="url(#bg)" stroke="#3d2914" stroke-width="40"/>
  <!-- 中心の「漢」字 -->
  <text x="512" y="700" text-anchor="middle"
        font-family="Hiragino Maru Gothic ProN, Hiragino Sans, Yu Gothic UI, Meiryo, sans-serif"
        font-weight="900" font-size="640" fill="#3d2914">漢</text>
  <!-- 右上のキラキラ -->
  <text x="780" y="280" text-anchor="middle"
        font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif"
        font-size="180">⭐</text>
</svg>
